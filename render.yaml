services:
  - type: web
    name: viper-cleaning-services
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: viper-data
      mountPath: /opt/render/project/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: DATABASE_PATH
        value: /opt/render/project/data/viper-cleaning.sqlite
      - key: OWNER_EMAIL
        value: shane.vipercleaningservices@gmail.com
      - key: MAIL_FROM
        value: shane.vipercleaningservices@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: OWNER_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
